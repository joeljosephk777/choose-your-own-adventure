<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Cave of Time — Choose Your Own Adventure</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fdf6e3;
      --paper: #fffef8;
      --text: #2c2010;
      --muted: #7a6a50;
      --accent: #8b3a0f;
      --accent-hover: #6b2a08;
      --choice-bg: #f5ede0;
      --choice-border: #c8a87a;
      --choice-hover: #e8d5b8;
      --crumb-bg: #ede4d0;
      --shadow: rgba(0, 0, 0, 0.12);
      --terminal-bg: #f0ebe0;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
      max-width: 680px;
      width: 100%;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.03em;
      color: var(--accent);
      margin-bottom: 4px;
    }

    header p.subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Breadcrumb trail */
    #trail-wrap {
      max-width: 680px;
      width: 100%;
      margin-bottom: 16px;
    }

    #trail {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      background: var(--crumb-bg);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 36px;
    }

    #trail .crumb {
      cursor: pointer;
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #trail .crumb:hover {
      color: var(--accent-hover);
    }

    #trail .sep {
      color: var(--muted);
    }

    #trail .crumb.current {
      color: var(--text);
      text-decoration: none;
      font-weight: bold;
      cursor: default;
    }

    /* Main page card */
    #page-card {
      max-width: 680px;
      width: 100%;
      background: var(--paper);
      border-radius: 12px;
      box-shadow: 0 4px 18px var(--shadow);
      padding: 36px 40px 32px;
      position: relative;
    }

    #page-number {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    #page-text {
      font-size: 1.08rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Choices */
    #choices {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background: var(--choice-bg);
      border: 1.5px solid var(--choice-border);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: Georgia, serif;
      font-size: 0.97rem;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      line-height: 1.5;
    }

    .choice-btn:hover {
      background: var(--choice-hover);
      border-color: var(--accent);
      transform: translateX(3px);
    }

    .choice-btn .arrow {
      color: var(--accent);
      margin-right: 8px;
      font-style: normal;
    }

    /* Terminal ending */
    #terminal-msg {
      margin-top: 28px;
      padding: 18px 20px;
      background: var(--terminal-bg);
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Controls */
    #controls {
      max-width: 680px;
      width: 100%;
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: transparent;
      border: 1.5px solid var(--choice-border);
      border-radius: 8px;
      padding: 9px 18px;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .ctrl-btn:hover {
      background: var(--crumb-bg);
      color: var(--text);
    }

    .ctrl-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* Progress */
    #progress {
      max-width: 680px;
      width: 100%;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
    }

    /* Terminal ending action buttons */
    .terminal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .terminal-actions .ctrl-btn {
      background: var(--accent);
      color: #fffef8;
      border-color: var(--accent);
      font-weight: bold;
    }

    .terminal-actions .ctrl-btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    /* Full story overlay */
    #full-story-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 20, 8, 0.75);
      z-index: 1000;
      overflow-y: auto;
      padding: 32px 16px 60px;
    }

    #full-story-wrap {
      max-width: 680px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    #full-story-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 24px 36px 18px;
      border-bottom: 1px solid var(--choice-border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    #full-story-header h2 {
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    #full-story-header .story-meta {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
    }

    .story-page-section {
      padding: 28px 36px;
      border-bottom: 1px solid var(--choice-border);
    }

    .story-page-section:last-child {
      border-bottom: none;
    }

    .story-page-num {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .story-page-text {
      font-size: 1.05rem;
      line-height: 1.82;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #full-story-footer {
      padding: 20px 36px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 2px solid var(--choice-border);
      background: var(--bg);
      position: sticky;
      bottom: 0;
    }

    /* Loading / error */
    #loading {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 60px;
    }

    #start-menu {
      max-width: 680px;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .start-menu-card {
      width: 100%;
      background: var(--paper);
      border-radius: 14px;
      box-shadow: 0 4px 18px var(--shadow);
      padding: 28px 24px;
      border: 1px solid rgba(200, 168, 122, 0.35);
    }

    .start-menu-title {
      font-size: 1.2rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .start-menu-copy {
      font-size: 0.92rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .start-menu-buttons {
      display: grid;
      gap: 10px;
    }

    #error-msg {
      color: #b91c1c;
      margin-top: 60px;
      font-size: 0.95rem;
    }

    /* Fade transition */
    #page-card {
      transition: opacity 0.2s ease;
    }

    #page-card.fade-out {
      opacity: 0;
    }

    @media (max-width: 520px) {
      #page-card {
        padding: 24px 20px 24px;
      }

      header h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>The Cave of Time</h1>
    <p class="subtitle">Choose Your Own Adventure &mdash; an interactive reader &nbsp;|&nbsp; <a
        href="author.html" style="color:var(--accent);font-style:normal">Author Tool</a></p>
  </header>

  <div id="trail-wrap">
    <div id="trail"></div>
  </div>

  <div id="loading">Loading story&hellip;</div>
  <div id="error-msg" style="display:none"></div>

  <div id="start-menu" style="display:none">
    <div class="start-menu-card">
      <div class="start-menu-title">Start at a beginning</div>
      <div class="start-menu-copy">Choose one of the marked story beginnings.</div>
      <div id="start-menu-buttons" class="start-menu-buttons"></div>
    </div>
  </div>

  <div id="page-card" style="display:none">
    <div id="page-number"></div>
    <div id="page-text"></div>
    <div id="choices"></div>
    <div id="terminal-msg" style="display:none">
      You have reached an ending.
      <div class="terminal-actions">
        <button class="ctrl-btn" id="btn-view-journey">&#9654; View Journey Graph</button>
        <button class="ctrl-btn" id="btn-read-story">&#9781; Read Full Story</button>
      </div>
    </div>
  </div>

  <div id="controls" style="display:none">
    <button class="ctrl-btn" id="btn-back">&#8592; Back</button>
    <button class="ctrl-btn" id="btn-restart">&#8635; Start Over</button>
  </div>

  <div id="progress"></div>

  <!-- Full story overlay -->
  <div id="full-story-overlay" style="display:none">
    <div id="full-story-wrap">
      <div id="full-story-header">
        <div>
          <h2>Your Story</h2>
          <div class="story-meta" id="story-meta"></div>
        </div>
        <button class="ctrl-btn" id="btn-close-story">&#10005; Close</button>
      </div>
      <div id="full-story-content"></div>
      <div id="full-story-footer">
        <button class="ctrl-btn" id="btn-restart-from-story">&#8635; Start Over</button>
      </div>
    </div>
  </div>

  <script>
    let PAGES = {};
    let START_PAGE = 2;
    let START_PAGES = [];
    let history = [];   // stack of page numbers visited
    let endings = new Set();   // page numbers reached that are terminals
    const AUTHOR_DRAFT_KEY = 'cyoa_author_draft_v1';

    // ── Load data ──────────────────────────────────────────────────────────
    fetch('pages.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        const merged = applyAuthorDraftOverride(data);
        PAGES = merged.pages;
        START_PAGE = Number(merged.meta?.start_page) || 2;

        function computeStartPages(mergedData, filePages) {
          // Pull from every source; accept both is_start (new) and is_story_beginning (legacy)
          const fromFile = filePages || [];
          const fromMeta = (mergedData.meta?.story_starts || []).map(Number).filter(Number.isFinite);
          const fromPages = Object.values(mergedData.pages || {})
            .filter(p => p.is_start || p.is_story_beginning)
            .map(p => p.page);
          return [...new Set([...fromFile, ...fromMeta, ...fromPages])].sort((a, b) => a - b);
        }

        // Load story_beginnings.txt (best source), fall back gracefully
        return fetch('story_beginnings.txt')
          .then(r => {
            if (!r.ok) throw new Error('not found');
            return r.text();
          })
          .then(text => {
            const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
            const fromFile = lines.map(l => Number(l.trim())).filter(Number.isFinite);
            START_PAGES = computeStartPages(merged, fromFile);
          })
          .catch(() => {
            START_PAGES = computeStartPages(merged, []);
          })
          .then(() => {
            if (!PAGES[String(START_PAGE)] && START_PAGES.length) {
              START_PAGE = START_PAGES[0];
            }
            document.getElementById('loading').style.display = 'none';
            // Support ?page=N URL param (e.g. from graph.html "Read from here")
            const urlPage = parseInt(new URLSearchParams(window.location.search).get('page'));
            if (urlPage && PAGES[String(urlPage)]) {
              showStoryView();
              goTo(urlPage, true);
            } else {
              showStartMenu();
            }
          });
      })
      .catch(err => {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error-msg');
        el.style.display = 'block';
        el.textContent = `Could not load pages.json: ${err.message}. Make sure you are serving this folder with a local web server.`;
      });

    function applyAuthorDraftOverride(baseData) {
      try {
        const raw = localStorage.getItem(AUTHOR_DRAFT_KEY);
        if (!raw) return baseData;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object' || typeof parsed.pages !== 'object') return baseData;

        return {
          ...baseData,
          meta: {
            ...(baseData.meta || {}),
            ...(parsed.meta || {}),
            start_page: Number(parsed.meta?.start_page || baseData.meta?.start_page || 2),
          },
          pages: parsed.pages,
        };
      } catch (_) {
        return baseData;
      }
    }

    // ── Navigation ─────────────────────────────────────────────────────────
    function goTo(pageNum, replace = false) {
      const page = PAGES[String(pageNum)];
      if (!page) {
        alert(`Page ${pageNum} not found in story data.`);
        return;
      }

      showStoryView();

      const card = document.getElementById('page-card');
      card.classList.add('fade-out');

      setTimeout(() => {
        if (replace) {
          history = [pageNum];
        } else {
          history.push(pageNum);
        }

        if (page.choices.length === 0) endings.add(pageNum);

        renderPage(page);
        renderTrail();
        renderControls();
        renderProgress();
        syncProgress();

        card.classList.remove('fade-out');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 180);
    }

    function goBack() {
      if (history.length <= 1) return;
      history.pop();
      const prev = history[history.length - 1];
      const page = PAGES[String(prev)];
      if (!page) return;

      const card = document.getElementById('page-card');
      card.classList.add('fade-out');
      setTimeout(() => {
        renderPage(page);
        renderTrail();
        renderControls();
        syncProgress();
        card.classList.remove('fade-out');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 180);
    }

    function restart() {
      showStartMenu();
    }

    function showStoryView() {
      document.getElementById('start-menu').style.display = 'none';
      document.getElementById('page-card').style.display = 'block';
      document.getElementById('controls').style.display = 'flex';
    }

    function showStartMenu() {
      history = [];
      endings = new Set();
      document.getElementById('page-card').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('trail').innerHTML = '';
      document.getElementById('progress').textContent = '';
      const menu = document.getElementById('start-menu');
      const buttons = document.getElementById('start-menu-buttons');
      buttons.innerHTML = '';

      if (START_PAGES.length === 0) {
        const msg = document.createElement('div');
        msg.style.cssText = 'color: var(--muted); font-size: 0.95rem; text-align: center; padding: 20px;';
        msg.textContent = 'No story beginnings have been marked yet. Use the Author tool to mark pages as story beginnings.';
        buttons.appendChild(msg);
      } else {
        START_PAGES.forEach(pageNum => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `<span class="arrow">&#9733;</span>Start at page ${pageNum}`;
          btn.addEventListener('click', () => goTo(pageNum, true));
          buttons.appendChild(btn);
        });
      }
      menu.style.display = 'flex';
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function renderPage(page) {
      document.getElementById('page-number').textContent = `Page ${page.page}`;

      const textEl = document.getElementById('page-text');
      textEl.textContent = page.text;

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';

      const isTerminal = page.choices.length === 0;

      if (!isTerminal) {
        page.choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `<span class="arrow">&#8594;</span>${escHtml(choice.label)}`;
          btn.addEventListener('click', () => goTo(choice.page));
          choicesEl.appendChild(btn);
        });
      }

      const termEl = document.getElementById('terminal-msg');
      termEl.style.display = isTerminal ? 'block' : 'none';
    }

    function renderTrail() {
      const trail = document.getElementById('trail');
      trail.innerHTML = '';

      if (history.length === 0) return;

      history.forEach((pg, i) => {
        const isCurrent = i === history.length - 1;
        const span = document.createElement('span');
        span.className = 'crumb' + (isCurrent ? ' current' : '');
        span.textContent = `Pg ${pg}`;

        if (!isCurrent) {
          span.addEventListener('click', () => {
            // Jump back to this point in history
            history = history.slice(0, i + 1);
            const page = PAGES[String(pg)];
            if (page) {
              const card = document.getElementById('page-card');
              card.classList.add('fade-out');
              setTimeout(() => {
                renderPage(page);
                renderTrail();
                renderControls();
                card.classList.remove('fade-out');
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }, 180);
            }
          });
        }

        trail.appendChild(span);

        if (!isCurrent) {
          const sep = document.createElement('span');
          sep.className = 'sep';
          sep.textContent = '→';
          trail.appendChild(sep);
        }
      });
    }

    function renderControls() {
      document.getElementById('btn-back').disabled = history.length <= 1;
    }

    function renderProgress() {
      const total = Object.keys(PAGES).length;
      const visited = new Set(history).size;
      const el = document.getElementById('progress');
      el.textContent = `Pages visited: ${visited} / ${total}  •  Endings found: ${endings.size}`;
    }

    document.getElementById('start-menu').addEventListener('click', e => {
      if (e.target === document.getElementById('start-menu')) {
        e.stopPropagation();
      }
    });

    // ── Sync progress to graph.html via localStorage ───────────────────────
    function syncProgress() {
      try { localStorage.setItem('cyoa_reader_path', JSON.stringify(history)); } catch (_) { }
    }

    // ── Wire up buttons ────────────────────────────────────────────────────
    document.getElementById('btn-back').addEventListener('click', goBack);
    document.getElementById('btn-restart').addEventListener('click', restart);

// ── Full story view ────────────────────────────────────────────────────
    function showFullStory() {
      const content = document.getElementById('full-story-content');
      content.innerHTML = '';

      history.forEach(pageNum => {
        const page = PAGES[String(pageNum)];
        if (!page) return;

        const section = document.createElement('div');
        section.className = 'story-page-section';

        const numEl = document.createElement('div');
        numEl.className = 'story-page-num';
        numEl.textContent = page.choices.length === 0
          ? `Page ${page.page} — The End`
          : `Page ${page.page}`;

        const textEl = document.createElement('div');
        textEl.className = 'story-page-text';
        textEl.textContent = page.text;

        section.appendChild(numEl);
        section.appendChild(textEl);
        content.appendChild(section);
      });

      document.getElementById('story-meta').textContent =
        `${history.length} pages read  ·  path: ${history.join(' → ')}`;

      const overlay = document.getElementById('full-story-overlay');
      overlay.style.display = 'block';
      overlay.scrollTop = 0;
    }

    // ── End-of-story buttons ───────────────────────────────────────────────
    document.getElementById('btn-view-journey').addEventListener('click', () => {
      syncProgress();
      window.open('graph.html', '_blank');
    });

    document.getElementById('btn-read-story').addEventListener('click', showFullStory);

    document.getElementById('btn-close-story').addEventListener('click', () => {
      document.getElementById('full-story-overlay').style.display = 'none';
    });

    document.getElementById('btn-restart-from-story').addEventListener('click', () => {
      document.getElementById('full-story-overlay').style.display = 'none';
      restart();
    });

    // Close overlay when clicking outside the story card
    document.getElementById('full-story-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('full-story-overlay')) {
        document.getElementById('full-story-overlay').style.display = 'none';
      }
    });

    // ── Utility ────────────────────────────────────────────────────────────
    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>

</html>
